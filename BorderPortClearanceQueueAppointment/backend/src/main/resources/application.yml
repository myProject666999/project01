server:
  port: 9090

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/border_port_clearance?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    defer-datasource-initialization: false
  data:
    redis:
      host: 127.0.0.1
      port: 6379

app:
  gps:
    check-radius: 1000
